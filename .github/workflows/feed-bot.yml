name: RSS Feed to Slack

on:
  # 毎日 8:00 JST (= 23:00 UTC の前日) に実行
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = JST 8:00
  
  # 手動実行も可能にする（テスト用）
  workflow_dispatch:

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install feedparser requests
    
    - name: Run feed bot
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        python feed_bot.py
    
    - name: Commit and push seen entries
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add seen_entries.json || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Update seen entries [skip ci]"
        git push || true
